<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Logs</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="/style.css">
</head>
<body class="bg-light">
    <div class="container py-5">
        <div class="d-flex justify-content-between align-items-center mb-5">
            <h2 class="fw-bold"><i class="fas fa-list-alt me-2"></i>System Logs</h2>
            <div class="d-flex gap-2">
                <a class="btn btn-secondary shadow-sm px-3" href="/"><i class="fas fa-arrow-left me-2"></i>Back to Dashboard</a>
            </div>
        </div>

        <div class="card shadow-sm mb-4">
            <div class="card-body">
                <div class="row g-3">
                    <div class="col-md-3">
                        <label class="form-label">Log Type</label>
                        <select id="logType" class="form-select" onchange="loadLogs()">
                            <option value="audit">Audit Logs</option>
                            <option value="events">Event Logs</option>
                        </select>
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">Search</label>
                        <input type="text" id="logSearch" class="form-control" placeholder="Search..." oninput="debounceLoadLogs()">
                    </div>
                    <div class="col-md-2">
                        <label class="form-label">Start Date</label>
                        <input type="datetime-local" id="logStartDate" class="form-control" onchange="loadLogs()">
                    </div>
                    <div class="col-md-2">
                        <label class="form-label">End Date</label>
                        <input type="datetime-local" id="logEndDate" class="form-control" onchange="loadLogs()">
                    </div>
                    <div class="col-md-2 d-flex align-items-end">
                        <button class="btn btn-primary w-100" onclick="loadLogs()"><i class="fas fa-sync me-2"></i>Refresh</button>
                    </div>
                </div>
            </div>
        </div>

        <div class="card shadow-sm">
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover mb-0" id="logsTable">
                        <thead class="table-light">
                            <!-- Headers populated dynamically -->
                        </thead>
                        <tbody>
                            <!-- Rows populated dynamically -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        let searchTimeout;

        function debounceLoadLogs() {
            clearTimeout(searchTimeout);
            searchTimeout = setTimeout(loadLogs, 500);
        }

        async function loadLogs() {
            const type = document.getElementById('logType').value;
            const search = document.getElementById('logSearch').value;
            const startDateStr = document.getElementById('logStartDate').value;
            const endDateStr = document.getElementById('logEndDate').value;

            let url = `/api/logs?type=${encodeURIComponent(type)}&search=${encodeURIComponent(search)}`;

            if (startDateStr) {
                const startTs = new Date(startDateStr).getTime() / 1000;
                url += `&startDate=${startTs}`;
            }
            if (endDateStr) {
                const endTs = new Date(endDateStr).getTime() / 1000;
                url += `&endDate=${endTs}`;
            }

            try {
                const res = await fetch(url);
                if (res.ok) {
                    const data = await res.json();
                    renderLogsTable(type, data);
                } else if (res.status === 401 || res.status === 403) {
                    window.location.href = '/login';
                }
            } catch (err) {
                console.error(err);
            }
        }

        function renderLogsTable(type, data) {
            const thead = document.querySelector('#logsTable thead');
            const tbody = document.querySelector('#logsTable tbody');

            thead.innerHTML = '';
            tbody.innerHTML = '';

            if (type === 'audit') {
                thead.innerHTML = `
                    <tr>
                        <th>Timestamp</th>
                        <th>Action</th>
                        <th>Username</th>
                        <th>Details</th>
                        <th>IP Address</th>
                    </tr>
                `;
            } else {
                thead.innerHTML = `
                    <tr>
                        <th>Timestamp</th>
                        <th>Asset Name</th>
                        <th>Status</th>
                        <th>Reason</th>
                        <th>Details</th>
                    </tr>
                `;
            }

            if (data.length === 0) {
                tbody.innerHTML = `<tr><td colspan="5" class="text-center py-4 text-muted">No logs found.</td></tr>`;
                return;
            }

            for (const row of data) {
                const tr = document.createElement('tr');
                const ts = new Date(row.timestamp * 1000).toLocaleString();

                if (type === 'audit') {
                    tr.innerHTML = `
                        <td>${ts}</td>
                        <td><span class="badge bg-secondary">${row.action}</span></td>
                        <td>${row.username}</td>
                        <td>${row.details || ''}</td>
                        <td>${row.ip_address || ''}</td>
                    `;
                } else {
                    const statusBadge = row.status === 'IN_ALARM' ? 'bg-danger' : 'bg-success';
                    tr.innerHTML = `
                        <td>${ts}</td>
                        <td class="fw-bold">${row.asset_name}</td>
                        <td><span class="badge ${statusBadge}">${row.status}</span></td>
                        <td>${row.reason || ''}</td>
                        <td>${row.details || ''}</td>
                    `;
                }
                tbody.appendChild(tr);
            }
        }

        // Check if admin on load
        function initDates() {
            const now = new Date();
            const startOfDay = new Date(now.getFullYear(), now.getMonth(), now.getDate(), 0, 0, 0);
            const endOfDay = new Date(now.getFullYear(), now.getMonth(), now.getDate(), 23, 59, 0);

            const formatDateTime = (date) => {
                const pad = (num) => num.toString().padStart(2, '0');
                return `${date.getFullYear()}-${pad(date.getMonth() + 1)}-${pad(date.getDate())}T${pad(date.getHours())}:${pad(date.getMinutes())}`;
            };

            document.getElementById('logStartDate').value = formatDateTime(startOfDay);
            document.getElementById('logEndDate').value = formatDateTime(endOfDay);
        }

        async function checkRole() {
            initDates();
            try {
                const res = await fetch('/api/auth/me');
                if (res.ok) {
                    const data = await res.json();
                    if (data.role !== 'admin') {
                        window.location.href = '/';
                    } else {
                        loadLogs();
                    }
                } else {
                    window.location.href = '/login';
                }
            } catch (err) {
                window.location.href = '/login';
            }
        }

        document.addEventListener('DOMContentLoaded', checkRole);
    </script>
</body>
</html>

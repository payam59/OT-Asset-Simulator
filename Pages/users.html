<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Management - Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-light">
    <div class="container py-5">
        <div class="d-flex justify-content-between align-items-center mb-5">
            <h2 class="fw-bold"><i class="fas fa-users-cog me-2"></i>Manage Users</h2>
            <div class="d-flex gap-2">
                <a class="btn btn-outline-secondary" href="/admin">
                    <i class="fas fa-arrow-left me-2"></i>Back to Admin Center
                </a>
                <a class="btn btn-info text-white" href="/settings">
                    <i class="fas fa-cogs me-2"></i>Settings
                </a>
                <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#addUserModal">
                    <i class="fas fa-user-plus me-2"></i>Add User
                </button>
            </div>
        </div>

        <div class="card shadow-sm">
            <div class="card-body">
                <table class="table table-hover align-middle">
                    <thead class="table-light">
                        <tr>
                            <th>ID</th>
                            <th>Username</th>
                            <th>Role</th>
                            <th>Status</th>
                            <th>Expiry</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="userTableBody">
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Add User Modal -->
    <div class="modal fade" id="addUserModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Create New User</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="addUserForm">
                        <div class="mb-3">
                            <label class="form-label">Username</label>
                            <input type="text" id="addUsername" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Password</label>
                            <input type="text" id="addPassword" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Role</label>
                            <select id="addRole" class="form-select" required>
                                <option value="read_only">Read Only</option>
                                <option value="read_write">Read/Write</option>
                                <option value="admin">Admin</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Account Expiry (Optional)</label>
                            <input type="date" id="addExpiryDate" class="form-control">
                            <small class="text-muted">Leave blank for no expiry.</small>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-primary" onclick="createUser()">Create User</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        async function fetchUsers() {
            try {
                const res = await fetch('/api/auth/users');
                if (!res.ok) {
                    if (res.status === 401 || res.status === 403) {
                        window.location.href = '/';
                    }
                    return;
                }
                const users = await res.json();
                const tbody = document.getElementById('userTableBody');
                tbody.innerHTML = '';

                users.forEach(u => {
                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td>${u.id}</td>
                        <td class="fw-bold">${u.username}</td>
                        <td><span class="badge bg-secondary">${u.access_level}</span></td>
                        <td>${u.needs_password_change ? '<span class=\"badge bg-warning text-dark\">Needs Password Reset</span>' : '<span class=\"badge bg-success\">OK</span>'}</td>
                        <td>${u.expiry_date ? new Date(u.expiry_date * 1000).toLocaleDateString() : '<span class=\"text-muted\">Never</span>'}</td>
                        <td>
                            <button class="btn btn-sm btn-outline-danger" onclick="resetPassword(${u.id})">
                                <i class="fas fa-key"></i> Reset Password
                            </button>
                        </td>
                    `;
                    tbody.appendChild(tr);
                });
            } catch (err) {
                console.error(err);
            }
        }

        async function createUser() {
            const u = document.getElementById('addUsername').value;
            const p = document.getElementById('addPassword').value;
            const r = document.getElementById('addRole').value;
            const expiryDate = document.getElementById('addExpiryDate').value;

            const res = await fetch('/api/auth/users', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    username: u,
                    password: p,
                    access_level: r,
                    expiry_date: expiryDate ? Math.floor(new Date(expiryDate + 'T23:59:59Z').getTime() / 1000) : null
                })
            });

            if (res.ok) {
                bootstrap.Modal.getInstance(document.getElementById('addUserModal')).hide();
                document.getElementById('addUserForm').reset();
                fetchUsers();
            } else {
                alert('Failed to create user');
            }
        }

        async function resetPassword(id) {
            const newPass = prompt("Enter new temporary password for user:");
            if (!newPass) return;

            const res = await fetch(`/api/auth/users/${id}/reset`, {
                method: 'PUT',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ password: newPass })
            });

            if (res.ok) {
                alert('Password reset successfully. User will be forced to change it on next login.');
                fetchUsers();
            } else {
                alert('Failed to reset password');
            }
        }

        fetchUsers();
    </script>
</body>
</html>

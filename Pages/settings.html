<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enterprise Security Settings</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-light">
    <div class="container py-5">
        <div class="d-flex justify-content-between align-items-center mb-5">
            <h2 class="fw-bold"><i class="fas fa-shield-alt me-2"></i>Security Settings</h2>
            <div class="d-flex gap-2">
                <a class="btn btn-outline-secondary" href="/admin">
                    <i class="fas fa-arrow-left me-2"></i>Back to Users
                </a>
            </div>
        </div>

        <div class="card shadow-sm mb-4">
            <div class="card-header bg-white fw-bold">General Policy</div>
            <div class="card-body">
                <div class="row mb-3">
                    <div class="col-md-6">
                        <label class="form-label">Session Timeout (Minutes)</label>
                        <input type="number" id="sessionTimeout" class="form-control" value="60">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Password History Count</label>
                        <input type="number" id="passwordHistory" class="form-control" value="3">
                        <small class="text-muted">Number of previous passwords that cannot be reused.</small>
                    </div>
                </div>
                <div class="mb-3">
                    <label class="form-label">Password Complexity Regex</label>
                    <input type="text" id="passwordRegex" class="form-control" value="^(?=.*[A-Za-z])(?=.*\d)[A-Za-z\d@$!%*#?&]{8,}$">
                </div>
            </div>
        </div>

        <div class="card shadow-sm mb-4">
            <div class="card-header bg-white fw-bold">Active Directory SSO Integration</div>
            <div class="card-body">
                <div class="form-check form-switch mb-3">
                    <input class="form-check-input" type="checkbox" id="adEnabled">
                    <label class="form-check-label" for="adEnabled">Enable AD Authentication</label>
                </div>
                <div class="row mb-3">
                    <div class="col-md-6">
                        <label class="form-label">AD Server (LDAP/LDAPS)</label>
                        <input type="text" id="adServer" class="form-control" placeholder="ldaps://dc.example.com">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">AD Domain</label>
                        <input type="text" id="adDomain" class="form-control" placeholder="example.com">
                        <small class="text-muted">e.g., example.com. Users will authenticate as username@example.com</small>
                    </div>
                </div>
                <div class="row mb-3">
                    <div class="col-md-6">
                        <label class="form-label">AD Service User</label>
                        <input type="text" id="adServiceUser" class="form-control" placeholder="service_account@example.com">
                        <small class="text-muted">Used to query AD for groups.</small>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">AD Service Password</label>
                        <input type="password" id="adServicePassword" class="form-control" placeholder="Password">
                    </div>
                </div>

                <div class="d-flex justify-content-between align-items-center mt-4 mb-3">
                    <h6 class="text-muted mb-0">Role Mapping (AD Groups)</h6>
                    <button class="btn btn-sm btn-outline-primary" onclick="loadAdGroups()">
                        <i class="fas fa-sync-alt me-1"></i>Load Groups from AD
                    </button>
                </div>
                <datalist id="adGroupsList"></datalist>
                <div class="row mb-3">
                    <div class="col-md-4">
                        <label class="form-label">Admin Group</label>
                        <input list="adGroupsList" type="text" id="adGroupAdmin" class="form-control" placeholder="Search groups...">
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Read/Write Group</label>
                        <input list="adGroupsList" type="text" id="adGroupRw" class="form-control" placeholder="Search groups...">
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Read-Only Group</label>
                        <input list="adGroupsList" type="text" id="adGroupRo" class="form-control" placeholder="Search groups...">
                    </div>
                </div>
            </div>
        </div>

        <div class="card shadow-sm mb-4">
            <div class="card-header bg-white">
                <h5 class="mb-0">Logging Settings</h5>
            </div>
            <div class="card-body">
                <div class="mb-3 form-check">
                    <input type="checkbox" class="form-check-input" id="enableAuditLog">
                    <label class="form-check-label" for="enableAuditLog">Enable Audit Logging (Security Events, Asset Changes)</label>
                </div>
                <div class="mb-3 form-check">
                    <input type="checkbox" class="form-check-input" id="enableAlarmLog">
                    <label class="form-check-label" for="enableAlarmLog">Enable File-Based Alarm Logging (simulation_logs/)</label>
                </div>
            </div>
        </div>

        <div class="text-end">
            <button class="btn btn-primary px-4" onclick="saveSettings()">Save Configuration</button>
        </div>
    </div>

    <script>
        async function loadSettings() {
            try {
                const res = await fetch('/api/auth/settings');
                if (res.ok) {
                    const data = await res.json();
                    document.getElementById('sessionTimeout').value = data.session_timeout_minutes ?? 60;
                    document.getElementById('passwordRegex').value = data.password_complexity_regex ?? "^(?=.*[A-Za-z])(?=.*\\d)[A-Za-z\\d@$!%*#?&]{8,}$";
                    document.getElementById('passwordHistory').value = data.password_history_count ?? 3;
                    document.getElementById('adEnabled').checked = data.ad_enabled === 1;
                    document.getElementById('adServer').value = data.ad_server ?? "";
                    document.getElementById('adDomain').value = data.ad_domain ?? "";
                    document.getElementById('adServiceUser').value = data.ad_service_user ?? "";
                    document.getElementById('adServicePassword').value = data.ad_service_password ?? "";
                    document.getElementById('adGroupAdmin').value = data.ad_group_admin ?? "";
                    document.getElementById('adGroupRw').value = data.ad_group_rw ?? "";
                    document.getElementById('adGroupRo').value = data.ad_group_ro ?? "";
                } else if (res.status === 401 || res.status === 403) {
                    window.location.href = '/login';
                }
            } catch (err) {
                console.error(err);
            }
        }

        async function saveSettings() {
            const payload = {
                SessionTimeoutMinutes: parseInt(document.getElementById('sessionTimeout').value),
                PasswordComplexityRegex: document.getElementById('passwordRegex').value,
                PasswordHistoryCount: parseInt(document.getElementById('passwordHistory').value),
                AdEnabled: document.getElementById('adEnabled').checked ? 1 : 0,
                AdServer: document.getElementById('adServer').value,
                AdDomain: document.getElementById('adDomain').value,
                AdServiceUser: document.getElementById('adServiceUser').value,
                AdServicePassword: document.getElementById('adServicePassword').value,
                AdGroupAdmin: document.getElementById('adGroupAdmin').value,
                AdGroupRw: document.getElementById('adGroupRw').value,
                AdGroupRo: document.getElementById('adGroupRo').value
            };

            const res = await fetch('/api/auth/settings', {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            if (res.ok) {
                alert('Settings saved successfully.');
            } else {
                alert('Failed to save settings.');
            }
        }

        async function loadAdGroups() {
            try {
                const res = await fetch('/api/auth/ad-groups');
                if (res.ok) {
                    const groups = await res.json();
                    const datalist = document.getElementById('adGroupsList');
                    datalist.innerHTML = '';
                    groups.forEach(g => {
                        const opt = document.createElement('option');
                        opt.value = g;
                        datalist.appendChild(opt);
                    });
                    alert(`Loaded ${groups.length} groups from AD.`);
                } else {
                    const data = await res.json();
                    alert('Failed to load groups: ' + data.error);
                }
            } catch (err) {
                alert('Error loading groups.');
                console.error(err);
            }
        }

        loadSettings();
    </script>
</body>
</html>

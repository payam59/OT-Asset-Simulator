<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Change Password</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-light">
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-4">
                <div class="card shadow-sm mt-5">
                    <div class="card-body p-4">
                        <div class="text-center mb-4">
                            <h4 class="fw-bold"><i class="fas fa-key me-2"></i>Change Password</h4>
                            <p class="text-muted">Please update your password to continue.</p>
                        </div>
                        <div id="alertBox" class="alert d-none"></div>
                        <form id="cpForm">
                            <div class="mb-3">
                                <label class="form-label">Current Password</label>
                                <input type="password" id="oldPass" class="form-control" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">New Password</label>
                                <input type="password" id="newPass" class="form-control" required minlength="5">
                            </div>
                            <div class="mb-4">
                                <label class="form-label">Confirm New Password</label>
                                <input type="password" id="newPass2" class="form-control" required minlength="5">
                            </div>
                            <button type="submit" class="btn btn-primary w-100">Update Password & Re-login</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script>
        document.getElementById('cpForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const oldPass = document.getElementById('oldPass').value;
            const newPass = document.getElementById('newPass').value;
            const newPass2 = document.getElementById('newPass2').value;
            const alertBox = document.getElementById('alertBox');

            if (newPass !== newPass2) {
                alertBox.className = 'alert alert-danger';
                alertBox.textContent = 'New passwords do not match!';
                return;
            }

            try {
                const res = await fetch('/api/auth/change-password', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ old_password: oldPass, new_password: newPass })
                });

                if (res.ok) {
                    alertBox.className = 'alert alert-success';
                    alertBox.textContent = 'Password updated successfully! Redirecting to login...';
                    setTimeout(() => window.location.href = '/login', 2000);
                } else {
                    const data = await res.json();
                    alertBox.className = 'alert alert-danger';
                    alertBox.textContent = data.error || 'Failed to update password';
                }
            } catch (err) {
                alertBox.className = 'alert alert-danger';
                alertBox.textContent = 'Server error';
            }
        });
    </script>
</body>
</html>
